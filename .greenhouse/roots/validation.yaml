schema_version: 1
defaults:
  required: &a1
    - &a2
      id: typecheck
      command: pnpm typecheck
    - &a3
      id: test
      command: pnpm test
    - &a4
      id: test:cli
      command: pnpm test:cli
  recommended:
    - &a5
      id: build
      command: pnpm build
timeouts:
  default_seconds: 300
  long_seconds: 900
modes:
  patch:
    required:
      - id: changed-scope
        command: greenhouse-spec verify --changed
  growth:
    required: *a1
  guarded:
    required:
      - *a2
      - *a3
      - *a4
      - *a5
    manual:
      - id: human-risk-review
        prompt: Human must review guarded risk notes before merge.
paths:
