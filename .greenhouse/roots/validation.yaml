    managed_by: greenhouse-spec
    origin: repo-shape
    proposal_id: validation-route:readme-md
    confidence: high
    mode: patch
    required:
      - id: test:templates
        command: pnpm test:templates
      - id: typecheck
        command: pnpm typecheck
    recommended: []
    manual: []
